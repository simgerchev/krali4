services:

  frontend:
    image: nginx:alpine
    ports:
      - "3001:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      HOST_IP: localhost
      CHALLENGE_IMAGE: krali4-challenge
      SESSION_TTL: "7200"
      RATE_LIMIT: "100/hour"  # relaxed for local dev; tighten in production
    restart: unless-stopped

  # challenge image is not run as a service — backend spawns containers on demand.
  # Build it once with:  docker build -t krali4-challenge ./challenge
  # Or use the Makefile:  make build
