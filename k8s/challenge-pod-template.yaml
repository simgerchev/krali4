# This is NOT applied directly — the backend generates Pods from this template.
# Kept here for reference and to show the security constraints applied per session.
apiVersion: v1
kind: Pod
metadata:
  name: krali4-SESSION_ID  # replaced at runtime
  namespace: krali4
  labels:
    app: krali4-challenge
    session_id: SESSION_ID
spec:
  restartPolicy: Never
  containers:
    - name: challenge
      image: krali4-challenge:latest
      ports:
        - containerPort: 22
      resources:
        requests:
          cpu: "100m"
          memory: "64Mi"
        limits:
          cpu: "500m"
          memory: "128Mi"
          ephemeral-storage: "100Mi"
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
          add: ["SETUID", "SETGID", "CHOWN", "DAC_OVERRIDE", "NET_BIND_SERVICE", "SYS_CHROOT", "AUDIT_WRITE"]
---
apiVersion: v1
kind: Service
metadata:
  name: krali4-SESSION_ID
  namespace: krali4
  labels:
    app: krali4-challenge
    session_id: SESSION_ID
spec:
  type: NodePort
  selector:
    session_id: SESSION_ID
  ports:
    - protocol: TCP
      port: 22
      targetPort: 22
      # nodePort is left unset so Kubernetes assigns one from 30000-32767
