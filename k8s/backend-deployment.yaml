apiVersion: apps/v1
kind: Deployment
metadata:
  name: krali4-backend
  namespace: krali4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: krali4-backend
  template:
    metadata:
      labels:
        app: krali4-backend
    spec:
      serviceAccountName: krali4-backend
      containers:
        - name: backend
          image: krali4-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: HOST_IP
              value: "REPLACE_WITH_CLUSTER_NODE_IP"
            - name: CHALLENGE_IMAGE
              value: "krali4-challenge:latest"
            - name: SESSION_TTL
              value: "7200"
            - name: ORCHESTRATOR
              value: "kubernetes"
            - name: CHALLENGE_NAMESPACE
              value: "krali4"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: krali4-backend
  namespace: krali4
spec:
  selector:
    app: krali4-backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: Namespace
metadata:
  name: krali4
