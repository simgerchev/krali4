# Block all ingress/egress for challenge pods except:
# - ingress on port 22 from anywhere (so players can SSH in)
# - no egress at all (prevents port scanning, mining, proxying)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: challenge-isolation
  namespace: krali4
spec:
  podSelector:
    matchLabels:
      app: krali4-challenge
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 22
  egress: []  # deny all egress
---
# Backend can reach the API server (already allowed by default),
# and can talk to challenge pods on port 22.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-policy
  namespace: krali4
spec:
  podSelector:
    matchLabels:
      app: krali4-backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 8000
  egress:
    - {}  # allow all egress (needs K8s API access)
