apiVersion: apps/v1
kind: Deployment
metadata:
  name: krali4-frontend
  namespace: __NAMESPACE__
  labels:
    app: krali4-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: krali4-frontend
  template:
    metadata:
      labels:
        app: krali4-frontend
    spec:
      imagePullSecrets:
        - name: gitlab-registry
      containers:
        - name: krali4-frontend
          image: __IMAGE_FRONTEND__
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
